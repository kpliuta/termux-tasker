name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Determine version bump
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qE '^[a-z]+(\(.+\))!:' || echo "$MSG" | grep -qi 'BREAKING CHANGE'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Get current version
        id: current
        run: |
          VERSION=$(poetry version --short)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.type }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Bump version in pyproject.toml
        run: poetry version "${{ steps.new.outputs.version }}"

      - name: Update CHANGELOG.md
        run: |
          NEW_VERSION="${{ steps.new.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          python3 -c "
          import re, sys
          path = 'CHANGELOG.md'
          with open(path) as f:
              text = f.read()
          header = text.split('## [Unreleased]')[0]
          body = text.split('## [Unreleased]')[1]
          content_lines = []
          for line in body.splitlines():
              if line.startswith('## ') and '[Unreleased]' not in line:
                  break
              content_lines.append(line)
          content = '\n'.join(content_lines).strip()
          new_block = f'## [Unreleased]\n\n\n## [$NEW_VERSION] - $DATE\n{content}\n'
          with open(path, 'w') as f:
              f.write(header + new_block)
          "

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md pyproject.toml
          git commit -m "chore(release): ${{ steps.new.outputs.version }}"
          git tag "${{ steps.new.outputs.version }}"
          git push && git push --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.new.outputs.version }}
          name: ${{ steps.new.outputs.version }}
          generate_release_notes: true
